# yaml-language-server: $schema=https://render.com/schema/render.yaml.json

services:
  - type: web
    name: secret-clubhouse
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm start
    autoDeployTrigger: commit
    renderSubdomainPolicy: enabled
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: secret-clubhouse-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:contact@secret-clubhouse.fr

databases:
  - name: secret-clubhouse-db
    databaseName: secret_clubhouse
    user: secret_clubhouse
    plan: basic-256mb
