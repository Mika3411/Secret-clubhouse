# yaml-language-server: $schema=https://render.com/schema/render.yaml.json

services:
  - type: web
    name: secret-clubhouse
    runtime: node
    region: frankfurt
    buildCommand: npm ci && npm run build
    startCommand: npm start
    autoDeployTrigger: commit
    renderSubdomainPolicy: enabled
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: secret-clubhouse-db
          property: connectionString
      - key: DATABASE_TRANSPORT
        value: render-private
      - key: JWT_SECRET
        generateValue: true
      - key: CONTENT_ENCRYPTION_KEY
        generateValue: true
      - key: AUTH_SESSION_TTL_SECONDS
        value: "43200"
      - key: NODE_ENV
        value: production
      - key: VITE_PUBLIC_APP_URL
        value: https://secret-clubhouse.onrender.com
      - key: PARENTAL_TIME_ZONE
        value: Europe/Paris
      - key: RTC_CALL_TIMEOUT_SECONDS
        value: "45"
      - key: RTC_STUN_URLS
        value: stun:stun.cloudflare.com:3478
      - key: RTC_TURN_KEY_ID
        sync: false
      - key: RTC_TURN_API_TOKEN
        sync: false
      - key: RTC_ENABLED
        value: "true"
      - key: RTC_NEUTRAL_DECLINE_MESSAGE
        value: Je ne peux pas répondre pour le moment.
      - key: FCM_ANDROID_PACKAGE
        value: fr.secretclubhouse.app
      - key: NATIVE_PUSH_TIMEOUT_MS
        value: "6000"
      - key: NATIVE_PUSH_ENABLED
        value: "false"
      - key: WEB_PUSH_TIMEOUT_MS
        value: "6000"
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: WEB_PUSH_ENABLED
        value: "true"
      - key: APNS_BUNDLE_ID
        value: fr.secretclubhouse.app
      - key: APNS_VOIP_TOPIC
        value: fr.secretclubhouse.app.voip
      - key: APNS_ENVIRONMENT
        value: production
      - key: VAPID_SUBJECT
        value: mailto:contact@secret-clubhouse.fr
      - key: PRIVACY_CONTACT_EMAIL
        value: contact@secret-clubhouse.fr
      - key: PRIVACY_ADMIN_ENABLED
        value: "false"
      - key: ADMIN_ANALYTICS_ENABLED
        value: "false"
      - key: PLATFORM_ADMIN_EMAILS
        sync: false
  - type: cron
    name: secret-clubhouse-retention
    runtime: node
    region: frankfurt
    schedule: "17 3 * * *"
    buildCommand: npm ci
    startCommand: npm run retention:purge
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: secret-clubhouse-db
          property: connectionString
      - key: DATABASE_TRANSPORT
        value: render-private
      - key: NODE_ENV
        value: production

databases:
  - name: secret-clubhouse-db
    region: frankfurt
    databaseName: secret_clubhouse
    user: secret_clubhouse
    plan: basic-256mb
